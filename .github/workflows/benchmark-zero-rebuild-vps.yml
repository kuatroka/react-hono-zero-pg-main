name: Benchmark Zero Rebuild on VPS

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Commit SHA or ref to benchmark on the VPS checkout
        required: true
        type: string
      label:
        description: Short label for the benchmark run
        required: true
        type: string
      timeout_minutes:
        description: Maximum minutes to wait for replica stabilization
        required: false
        type: string
        default: "180"
      restore_prod:
        description: Restore VPS to main HEAD after benchmark
        required: false
        type: boolean
        default: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Benchmark zero-cache rebuild via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          timeout: 240m
          command_timeout: 240m
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/dev/erudio_app/react-hono-zero-pg-main}"
            PROD_ENV_FILE="${PROD_ENV_FILE:-/etc/fintellectus/react-hono-zero-pg-main.env}"
            FALLBACK_ENV_FILE="$APP_DIR/.env.prod"
            TARGET_REF="${{ inputs.git_ref }}"
            LABEL="${{ inputs.label }}"
            TIMEOUT_MINUTES="${{ inputs.timeout_minutes }}"
            RESTORE_PROD="${{ inputs.restore_prod }}"

            if [ ! -d "$APP_DIR" ]; then
              echo "Missing app directory: $APP_DIR"
              exit 1
            fi

            if [ ! -f "$PROD_ENV_FILE" ] && [ -f "$FALLBACK_ENV_FILE" ]; then
              PROD_ENV_FILE="$FALLBACK_ENV_FILE"
            fi

            if [ ! -f "$PROD_ENV_FILE" ]; then
              echo "Missing production env file: $PROD_ENV_FILE"
              exit 1
            fi

            cd "$APP_DIR"

            set -a
            . "$PROD_ENV_FILE"
            set +a

            compose() {
              docker compose --env-file "$PROD_ENV_FILE" -f "$APP_DIR/infra/prod/docker-compose.yml" "$@"
            }

            # --- Phase 1: Build and start the target ref ---
            git reset --hard HEAD
            git fetch origin main --tags
            git checkout -f "$TARGET_REF"

            compose config >/dev/null
            compose build app
            compose up -d postgres app

            compose stop zero-cache || true
            compose rm -f zero-cache || true
            docker volume rm -f "${ZERO_REPLICA_VOLUME_NAME}" || true

            SUMMARY_FILE="/tmp/zero-rebuild-${LABEL}-summary.json"

            compose up -d zero-cache

            # --- Phase 2: Poll replica size until growth stalls ---
            # Uses rate-of-change detection instead of exact size match,
            # because SQLite WAL and journal writes cause small fluctuations.
            # "Stable" = growth rate < 0.1% across 3 consecutive samples.
            # Base64-encode the Python script to avoid any shell quoting/heredoc issues
            # with the SSH action's guard injection.
            POLL_SCRIPT="/tmp/zero-bench-poll-$$.py"
            base64 -d << 'B64EOF' > "$POLL_SCRIPT"
            
            B64EOF

            python3 "$POLL_SCRIPT" "$SUMMARY_FILE" "$ZERO_CONTAINER_NAME" "$ZERO_REPLICA_FILE" "$LABEL" "$TIMEOUT_MINUTES"
            rm -f "$POLL_SCRIPT"

            echo "=== Benchmark Summary ==="
            echo "APP_PUBLIC_URL=$APP_PUBLIC_URL"
            echo "ZERO_PUBLIC_URL=$ZERO_PUBLIC_URL"
            echo "SUMMARY_FILE=$SUMMARY_FILE"
            cat "$SUMMARY_FILE"

            # --- Phase 3: Restore prod to main HEAD ---
            if [ "$RESTORE_PROD" = "true" ]; then
              echo "=== Restoring prod to origin/main ==="
              git fetch origin main
              git checkout -f origin/main
              compose build app
              compose up -d postgres app
              # Keep zero-cache running on main with existing replica
              # (no volume wipe — replica is compatible with main)
              compose up -d zero-cache
              echo "=== Prod restored to origin/main ==="
            else
              echo "=== Skipping prod restore (restore_prod=false) ==="
            fi
