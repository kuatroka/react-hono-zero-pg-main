name: Benchmark Zero Rebuild on VPS

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Commit SHA or ref to benchmark on the VPS checkout
        required: true
        type: string
      label:
        description: Short label for the benchmark run
        required: true
        type: string

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Benchmark zero-cache rebuild via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          timeout: 120m
          command_timeout: 120m
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/dev/erudio_app/react-hono-zero-pg-main}"
            PROD_ENV_FILE="${PROD_ENV_FILE:-/etc/fintellectus/react-hono-zero-pg-main.env}"
            FALLBACK_ENV_FILE="$APP_DIR/.env.prod"
            TARGET_REF="${{ inputs.git_ref }}"
            LABEL="${{ inputs.label }}"

            if [ ! -d "$APP_DIR" ]; then
              echo "Missing app directory: $APP_DIR"
              exit 1
            fi

            if [ ! -f "$PROD_ENV_FILE" ] && [ -f "$FALLBACK_ENV_FILE" ]; then
              PROD_ENV_FILE="$FALLBACK_ENV_FILE"
            fi

            if [ ! -f "$PROD_ENV_FILE" ]; then
              echo "Missing production env file: $PROD_ENV_FILE"
              exit 1
            fi

            cd "$APP_DIR"

            set -a
            . "$PROD_ENV_FILE"
            set +a

            compose() {
              docker compose --env-file "$PROD_ENV_FILE" -f "$APP_DIR/infra/prod/docker-compose.yml" "$@"
            }

            git reset --hard HEAD
            git fetch origin main --tags
            git checkout -f "$TARGET_REF"

            compose config >/dev/null
            compose build app
            compose up -d postgres app

            compose stop zero-cache || true
            compose rm -f zero-cache || true
            docker volume rm -f "${ZERO_REPLICA_VOLUME_NAME}" || true

            SUMMARY_FILE="/tmp/zero-rebuild-${LABEL}-summary.json"

            compose up -d zero-cache

            PYTHON_CODE=$'import json, subprocess, sys, time\nsummary_path, container_name, replica_file, label = sys.argv[1:]\nstart = time.time()\ntimeout_seconds = 90 * 60\nmarker = \"ZeroEvent: zero/events/status/replication/v1 \"\nfinal_event = None\n\ndef replica_size_bytes():\n    result = subprocess.run([\"docker\", \"exec\", container_name, \"sh\", \"-lc\", f\"if [ -f \\\\\\\"{replica_file}\\\\\\\" ]; then wc -c < \\\\\\\"{replica_file}\\\\\\\"; else echo 0; fi\"], capture_output=True, text=True, check=False)\n    output = (result.stdout or \"\").strip()\n    return int(output) if output.isdigit() else 0\n\ndef current_logs():\n    result = subprocess.run([\"docker\", \"logs\", container_name], capture_output=True, text=True, check=False)\n    return (result.stdout or \"\") + \"\\n\" + (result.stderr or \"\")\n\nwhile time.time() - start < timeout_seconds:\n    lines = current_logs().splitlines()\n    for line in reversed(lines):\n        marker_index = line.find(marker)\n        if marker_index < 0:\n            continue\n        try:\n            payload = json.loads(line[marker_index + len(marker):])\n        except json.JSONDecodeError:\n            continue\n        download = payload.get(\"state\", {}).get(\"downloadStatus\")\n        if not download:\n            continue\n        if all(item.get(\"rows\") is not None and item.get(\"totalRows\") is not None and int(item[\"rows\"]) >= int(item[\"totalRows\"]) for item in download):\n            final_event = payload\n            break\n    if final_event is not None:\n        break\n    time.sleep(5)\n\nif final_event is None:\n    raise SystemExit(\"Timed out waiting for Zero rebuild completion\")\n\nelapsed_ms = round((time.time() - start) * 1000)\nsummary = {\"label\": label, \"elapsedMs\": elapsed_ms, \"replicaSizeBytes\": replica_size_bytes(), \"tables\": final_event[\"state\"][\"downloadStatus\"]}\nwith open(summary_path, \"w\", encoding=\"utf-8\") as handle:\n    json.dump(summary, handle, indent=2)\nprint(json.dumps(summary, indent=2))'

            python3 -c "$PYTHON_CODE" "$SUMMARY_FILE" "$ZERO_CONTAINER_NAME" "$ZERO_REPLICA_FILE" "$LABEL"

            echo "APP_PUBLIC_URL=$APP_PUBLIC_URL"
            echo "ZERO_PUBLIC_URL=$ZERO_PUBLIC_URL"
            echo "SUMMARY_FILE=$SUMMARY_FILE"
            cat "$SUMMARY_FILE"
