name: Benchmark Zero Rebuild on VPS

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Commit SHA or ref to benchmark on the VPS checkout
        required: true
        type: string
      label:
        description: Short label for the benchmark run
        required: true
        type: string

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Benchmark zero-cache rebuild via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          timeout: 120m
          command_timeout: 120m
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/dev/erudio_app/react-hono-zero-pg-main}"
            PROD_ENV_FILE="${PROD_ENV_FILE:-/etc/fintellectus/react-hono-zero-pg-main.env}"
            FALLBACK_ENV_FILE="$APP_DIR/.env.prod"
            TARGET_REF="${{ inputs.git_ref }}"
            LABEL="${{ inputs.label }}"

            if [ ! -d "$APP_DIR" ]; then
              echo "Missing app directory: $APP_DIR"
              exit 1
            fi

            if [ ! -f "$PROD_ENV_FILE" ] && [ -f "$FALLBACK_ENV_FILE" ]; then
              PROD_ENV_FILE="$FALLBACK_ENV_FILE"
            fi

            if [ ! -f "$PROD_ENV_FILE" ]; then
              echo "Missing production env file: $PROD_ENV_FILE"
              exit 1
            fi

            cd "$APP_DIR"

            set -a
            . "$PROD_ENV_FILE"
            set +a

            compose() {
              docker compose --env-file "$PROD_ENV_FILE" -f "$APP_DIR/infra/prod/docker-compose.yml" "$@"
            }

            git reset --hard HEAD
            git fetch origin main --tags
            git checkout -f "$TARGET_REF"

            compose config >/dev/null
            compose build app
            compose up -d postgres app

            compose stop zero-cache || true
            compose rm -f zero-cache || true
            docker volume rm -f "${ZERO_REPLICA_VOLUME_NAME}" || true

            SUMMARY_FILE="/tmp/zero-rebuild-${LABEL}-summary.json"

            compose up -d zero-cache

            PYTHON_CODE=$'import json, subprocess, sys, time\nsummary_path, container_name, replica_file, label = sys.argv[1:]\nstart = time.time()\ntimeout_seconds = 90 * 60\npoll_seconds = 10\nstable_samples_required = 3\nlast_size = None\nstable_samples = 0\nsamples = []\n\ndef replica_size_bytes():\n    result = subprocess.run([\"docker\", \"exec\", container_name, \"sh\", \"-lc\", f\"if [ -f \\\\\\\"{replica_file}\\\\\\\" ]; then wc -c < \\\\\\\"{replica_file}\\\\\\\"; else echo 0; fi\"], capture_output=True, text=True, check=False)\n    output = (result.stdout or \"\").strip()\n    return int(output) if output.isdigit() else 0\n\ndef container_running():\n    result = subprocess.run([\"docker\", \"inspect\", \"-f\", \"{{.State.Running}}\", container_name], capture_output=True, text=True, check=False)\n    return (result.stdout or \"\").strip() == \"true\"\n\nwhile time.time() - start < timeout_seconds:\n    if not container_running():\n        raise SystemExit(\"zero-cache container stopped before benchmark completion\")\n    current_size = replica_size_bytes()\n    samples.append(current_size)\n    if current_size > 0 and current_size == last_size:\n        stable_samples += 1\n    else:\n        stable_samples = 0\n    last_size = current_size\n    if current_size > 0 and stable_samples >= stable_samples_required:\n        break\n    time.sleep(poll_seconds)\nelse:\n    raise SystemExit(\"Timed out waiting for replica size to stabilize\")\n\nelapsed_ms = round((time.time() - start) * 1000)\nsummary = {\"label\": label, \"elapsedMs\": elapsed_ms, \"replicaSizeBytes\": last_size or 0, \"replicaSamples\": samples}\nwith open(summary_path, \"w\", encoding=\"utf-8\") as handle:\n    json.dump(summary, handle, indent=2)\nprint(json.dumps(summary, indent=2))'

            python3 -c "$PYTHON_CODE" "$SUMMARY_FILE" "$ZERO_CONTAINER_NAME" "$ZERO_REPLICA_FILE" "$LABEL"

            echo "APP_PUBLIC_URL=$APP_PUBLIC_URL"
            echo "ZERO_PUBLIC_URL=$ZERO_PUBLIC_URL"
            echo "SUMMARY_FILE=$SUMMARY_FILE"
            cat "$SUMMARY_FILE"
